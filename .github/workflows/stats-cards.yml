name: Update README cards

on:
push:
branches:
- main
- master

schedule:
# 每12小时更新一次
- cron: "0 */12 * * *"

workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest


steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Generate stats card
    uses: readme-tools/github-readme-stats-action@v1
    with:
      card: stats
      options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&card_height=180&include_all_commits=true
      path: profile/stats.svg
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Generate top languages card
    uses: readme-tools/github-readme-stats-action@v1
    with:
      card: top-langs
      options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&card_height=180
      path: profile/top-langs.svg
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Generate pin card
    uses: readme-tools/github-readme-stats-action@v1
    with:
      card: pin
      options: username=readme-tools&repo=github-readme-stats&hide_border=true
      path: profile/pin-readme-tools-github-readme-stats.svg
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Commit cards
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add profile/*.svg

      git diff --cached --quiet && exit 0

      git commit -m "chore: update README cards"
      git push
